<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iris Classification</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
      }
      .card {
        border: none;
        border-radius: 15px;
      }
      .flower-img {
        max-height: 250px;
        object-fit: cover;
        border-radius: 10px;
        display: none;
      }
      .btn-custom {
        border-radius: 8px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card shadow-lg">
            <div class="card-body p-5">
              <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">🌿 Iris Flower Classifier</h3>
                <p class="text-muted">
                  Dự đoán loài hoa diên vĩ dựa trên kích thước cánh hoa
                </p>
              </div>

              <form id="predictionForm">
                <div class="row g-3 mb-4">
                  <div class="col-6">
                    <label class="form-label text-secondary small fw-bold"
                      >Sepal Length (cm)</label
                    >
                    <input
                      type="number"
                      step="0.1"
                      class="form-control"
                      id="sepal_length"
                      required
                    />
                  </div>
                  <div class="col-6">
                    <label class="form-label text-secondary small fw-bold"
                      >Sepal Width (cm)</label
                    >
                    <input
                      type="number"
                      step="0.1"
                      class="form-control"
                      id="sepal_width"
                      required
                    />
                  </div>
                  <div class="col-6">
                    <label class="form-label text-secondary small fw-bold"
                      >Petal Length (cm)</label
                    >
                    <input
                      type="number"
                      step="0.1"
                      class="form-control"
                      id="petal_length"
                      required
                    />
                  </div>
                  <div class="col-6">
                    <label class="form-label text-secondary small fw-bold"
                      >Petal Width (cm)</label
                    >
                    <input
                      type="number"
                      step="0.1"
                      class="form-control"
                      id="petal_width"
                      required
                    />
                  </div>
                </div>

                <div class="d-flex gap-2">
                  <button
                    type="button"
                    id="randomBtn"
                    class="btn btn-outline-secondary w-50 btn-custom"
                  >
                    🎲 Random Data
                  </button>
                  <button type="submit" class="btn btn-primary w-50 btn-custom">
                    ✨ Dự đoán
                  </button>
                </div>
              </form>

              <div id="resultBox" class="mt-4 text-center d-none">
                <hr />
                <h5 id="resultText" class="mb-3"></h5>
                <img
                  id="flowerImage"
                  class="flower-img img-fluid shadow-sm"
                  src=""
                  alt="Flower Image"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // 1. Chức năng Random Data dựa trên range thực tế của tập Iris
      document
        .getElementById("randomBtn")
        .addEventListener("click", function () {
          // Hàm tạo số ngẫu nhiên với 1 chữ số thập phân
          const getRandom = (min, max) =>
            (Math.random() * (max - min) + min).toFixed(1);

          document.getElementById("sepal_length").value = getRandom(4.3, 7.9);
          document.getElementById("sepal_width").value = getRandom(2.0, 4.4);
          document.getElementById("petal_length").value = getRandom(1.0, 6.9);
          document.getElementById("petal_width").value = getRandom(0.1, 2.5);

          // Ẩn kết quả cũ đi (nếu có) khi random data mới
          document.getElementById("resultBox").classList.add("d-none");
        });

      // 2. Mapping hình ảnh cho 3 loài hoa (Lấy từ Wikimedia Commons)
      const flowerImages = {
        setosa:
          "https://upload.wikimedia.org/wikipedia/commons/a/a7/Irissetosa1.jpg",
        versicolor:
          "https://upload.wikimedia.org/wikipedia/commons/2/27/Blue_Flag%2C_Ottawa.jpg",
        virginica:
          "https://upload.wikimedia.org/wikipedia/commons/9/9f/Iris_virginica.jpg",
      };

      // 3. Xử lý Submit Form gọi API
      document
        .getElementById("predictionForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const features = [
            parseFloat(document.getElementById("sepal_length").value),
            parseFloat(document.getElementById("sepal_width").value),
            parseFloat(document.getElementById("petal_length").value),
            parseFloat(document.getElementById("petal_width").value),
          ];

          const resultBox = document.getElementById("resultBox");
          const resultText = document.getElementById("resultText");
          const flowerImage = document.getElementById("flowerImage");

          resultBox.classList.remove("d-none");
          resultText.innerHTML =
            '<span class="text-muted">Đang phân tích...</span>';
          flowerImage.style.display = "none";

          try {
            // Gọi API backend (app.py)
            const response = await fetch("/predict", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ features: features }),
            });

            const data = await response.json();

            if (response.ok && !data.ERROR) {
              const species = data.species; // Lấy tên loài hoa (setosa, versicolor, virginica)

              // Cập nhật text kết quả
              resultText.innerHTML = `Kết quả: <strong class="text-success text-capitalize">${species}</strong>`;

              // Cập nhật hình ảnh tương ứng
              flowerImage.src = flowerImages[species];
              flowerImage.style.display = "inline-block";
            } else {
              resultText.innerHTML = `<span class="text-danger">Lỗi: ${data.ERROR}</span>`;
            }
          } catch (error) {
            resultText.innerHTML = `<span class="text-danger">Không thể kết nối tới Server.</span>`;
          }
        });
    </script>
  </body>
</html>
